<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeSealant Expert Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-red { border: 6px solid #ef4444 !important; background: #fee2e2 !important; }
        .status-green { border: 6px solid #22c55e !important; background: #f0fdf4 !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; overflow-y: auto; padding: 20px; }
        input, select { border: 3px solid #cbd5e1; padding: 12px; border-radius: 15px; width: 100%; color: #000; font-weight: 900; font-size: 1.2rem; background: white !important; }
        .text-ml-gigante { font-size: 2.8rem; font-weight: 900; color: #1e40af; line-height: 1; }
        .text-dias-gigante { font-size: 3.5rem; font-weight: 900; line-height: 1; color: #000; }
    </style>
</head>
<body class="bg-gray-200 text-slate-900 min-h-screen pb-32 font-sans px-4">

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 hidden bg-emerald-600 text-white px-10 py-5 rounded-2xl shadow-2xl font-black z-[100] border-4 border-white text-xl text-center uppercase">
        ✅ ACTUALIZADO
    </div>

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center py-6 bg-white px-8 rounded-3xl shadow-lg my-6">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">Bike<span class="text-blue-600">Sealant</span></h1>
            <button onclick="openSettings()" class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center text-3xl text-white shadow-xl">
                <i class="fas fa-cog"></i>
            </button>
        </header>

        <!-- GRID 4 COLUMNAS -->
        <div id="bikeList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

        <button onclick="openBikeModal()" class="fixed bottom-10 right-8 bg-blue-700 w-24 h-24 rounded-full shadow-2xl text-4xl flex items-center justify-center text-white border-4 border-white z-40">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- MODAL BICICLETA COMPACTO -->
    <div id="bikeModal" class="modal flex items-center justify-center">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-sm shadow-2xl border-4 border-blue-600 text-slate-900">
            <h2 id="modalTitle" class="text-2xl font-black uppercase mb-4 text-center italic border-b-4 pb-2">Cargar Bici</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400">Nombre de la Bici</label>
                    <input id="bikeName" type="text" placeholder="EJ: MI TREK">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="bikeCategory" onchange="updateMLSuggestions()">
                        <option value="Ruta">RUTA</option><option value="Gravel">GRAVEL</option><option value="Montaña" selected>MONTAÑA</option>
                    </select>
                    <select id="tireSize" onchange="updateMLSuggestions()">
                        <option value='700c'>700c</option><option value='26"'>26"</option><option value='29"'>29"</option><option value='32"'>32"</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="tireWidth" onchange="updateMLSuggestions()"></select>
                    <select id="liquidType">
                        <option value="natural">L. NATURAL</option><option value="sintetico">L. SINTÉTICO</option>
                    </select>
                </div>
                <div class="bg-gray-100 p-4 rounded-2xl space-y-3">
                    <p class="text-[10px] font-black text-slate-500 uppercase text-center italic">Editar fechas manualmente</p>
                    <div><label class="text-[9px] font-black uppercase">Últ. Cambio Total</label><input id="manualChangeDate" type="date"></div>
                    <div><label class="text-[9px] font-black uppercase">Últ. Relleno</label><input id="manualRefillDate" type="date"></div>
                </div>
                <div id="mlHint" class="bg-blue-600 text-white p-4 rounded-xl text-center text-3xl font-black italic"></div>
                <div class="flex gap-2">
                    <button onclick="closeModal('bikeModal')" class="flex-1 bg-slate-200 p-4 rounded-xl font-black uppercase text-sm">Cerrar</button>
                    <button onclick="saveBike()" class="flex-1 bg-slate-900 text-white p-4 rounded-xl font-black shadow-xl uppercase text-sm">Guardar</button>
                </div>
                <input id="editIndex" type="hidden" value="-1">
            </div>
        </div>
    </div>

    <!-- MODAL AJUSTES -->
    <div id="settingsModal" class="modal">
        <div class="p-6 min-h-screen flex items-center justify-center">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-md text-slate-900">
                <h2 class="text-2xl font-black uppercase mb-6 border-b-4 border-black italic text-center">Ajustes Expertos</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-3 gap-2 text-center font-black text-[10px] uppercase text-slate-400">
                        <div>TIPO</div><div>RELL. (meses)</div><div>CAMBIO (meses)</div>
                    </div>
                    <div class="flex items-center gap-2 font-black">
                        <span class="w-20 text-[10px]">NATURAL</span>
                        <input id="freq_nat_rell" type="number" class="text-center"><input id="freq_nat_full" type="number" class="text-center">
                    </div>
                    <div class="flex items-center gap-2 font-black">
                        <span class="w-20 text-[10px]">SINTÉTICO</span>
                        <input id="freq_sin_rell" type="number" class="text-center"><input id="freq_sin_full" type="number" class="text-center">
                    </div>
                    <button onclick="saveFrequencies()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black uppercase text-xs">Guardar Tabla</button>
                    
                    <div class="border-t pt-4">
                        <h3 class="font-black text-slate-400 uppercase text-xs mb-2">Alta de Llantas (Ancho mm)</h3>
                        <div class="flex gap-2"><input id="newWidth" type="number" placeholder="MM" class="flex-1"><button onclick="addWidth()" class="bg-black text-white px-6 rounded-xl font-black text-xl">+</button></div>
                        <div id="widthList" class="flex flex-wrap gap-2 py-2"></div>
                    </div>
                </div>
                <button onclick="closeModal('settingsModal')" class="w-full bg-slate-100 text-slate-500 p-4 rounded-xl font-black mt-6 uppercase">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let appConfig = JSON.parse(localStorage.getItem('bsc_expert_v9')) || {
            widths: [25, 28, 30, 42, 45, 50, 55],
            freq: { natural: { rell: 3, full: 8 }, sintetico: { rell: 5, full: 12 } }
        };
        let bikes = JSON.parse(localStorage.getItem('bikes_expert_v9')) || [];

        function calculateML(cat, size, width) {
            let f = (size === '700c' || size === '29"') ? 2.1 : (size === '26"' ? 1.8 : 2.4);
            let ml = width * f;
            if (cat === 'Montaña') ml *= 1.25; if (cat === 'Gravel') ml *= 1.1; if (cat === 'Ruta') ml *= 0.95;
            return Math.round(ml / 10) * 10;
        }

        function saveAppData() {
            localStorage.setItem('bsc_expert_v9', JSON.stringify(appConfig));
            localStorage.setItem('bikes_expert_v9', JSON.stringify(bikes));
            renderBikes();
        }

        function openBikeModal(index = -1) {
            document.getElementById('tireWidth').innerHTML = appConfig.widths.map(w => `<option value="${w}">${w} mm</option>`).join('');
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('editIndex').value = index;
            if(index >= 0) {
                const b = bikes[index];
                document.getElementById('modalTitle').innerText = "EDITAR BICI";
                document.getElementById('bikeName').value = b.name;
                document.getElementById('bikeCategory').value = b.category;
                document.getElementById('tireSize').value = b.size;
                document.getElementById('tireWidth').value = b.width;
                document.getElementById('liquidType').value = b.liquid;
                document.getElementById('manualChangeDate').value = b.lastChange;
                document.getElementById('manualRefillDate').value = b.lastRefill;
            } else {
                document.getElementById('modalTitle').innerText = "NUEVA BICI";
                document.getElementById('bikeName').value = "";
                document.getElementById('manualChangeDate').value = today;
                document.getElementById('manualRefillDate').value = today;
            }
            document.getElementById('bikeModal').style.display = 'flex';
            updateMLSuggestions();
        }

        function saveBike() {
            const idx = parseInt(document.getElementById('editIndex').value);
            const data = {
                name: document.getElementById('bikeName').value || "BICI SIN NOMBRE",
                category: document.getElementById('bikeCategory').value,
                size: document.getElementById('tireSize').value,
                width: document.getElementById('tireWidth').value,
                liquid: document.getElementById('liquidType').value,
                lastChange: document.getElementById('manualChangeDate').value,
                lastRefill: document.getElementById('manualRefillDate').value
            };
            if(idx >= 0) bikes[idx] = data; else bikes.push(data);
            saveAppData(); closeModal('bikeModal'); showOk();
        }

        function quickUpdate(index, type) {
            const today = new Date().toISOString().split('T')[0];
            if (type === 'relleno') bikes[index].lastRefill = today;
            else { bikes[index].lastChange = today; bikes[index].lastRefill = today; }
            saveAppData(); showOk();
        }

        function updateMLSuggestions() {
            const ml = calculateML(document.getElementById('bikeCategory').value, document.getElementById('tireSize').value, document.getElementById('tireWidth').value);
            document.getElementById('mlHint').innerText = `${ml} ML`;
        }

        function saveFrequencies() {
            appConfig.freq.natural.rell = parseInt(document.getElementById('freq_nat_rell').value);
            appConfig.freq.natural.full = parseInt(document.getElementById('freq_nat_full').value);
            appConfig.freq.sintetico.rell = parseInt(document.getElementById('freq_sin_rell').value);
            appConfig.freq.sintetico.full = parseInt(document.getElementById('freq_sin_full').value);
            saveAppData(); showOk();
        }

        function addWidth() {
            const v = parseInt(document.getElementById('newWidth').value);
            if(v && !appConfig.widths.includes(v)) { appConfig.widths.push(v); appConfig.widths.sort((a,b)=>a-b); saveAppData(); renderWidthList(); }
        }

        function renderWidthList() {
            document.getElementById('widthList').innerHTML = appConfig.widths.map(w => `<div class="bg-black text-white px-3 py-1 rounded-xl font-bold flex items-center gap-2 text-xs">${w}mm <button onclick="appConfig.widths=appConfig.widths.filter(x=>x!=${w});saveAppData();renderWidthList();" class="text-red-500 font-black">&times;</button></div>`).join('');
        }

        function openSettings() {
            document.getElementById('freq_nat_rell').value = appConfig.freq.natural.rell;
            document.getElementById('freq_nat_full').value = appConfig.freq.natural.full;
            document.getElementById('freq_sin_rell').value = appConfig.freq.sintetico.rell;
            document.getElementById('freq_sin_full').value = appConfig.freq.sintetico.full;
            renderWidthList();
            document.getElementById('settingsModal').style.display = 'block';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showOk() { const t = document.getElementById('toast'); t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }

        function renderBikes() {
            const container = document.getElementById('bikeList');
            container.innerHTML = "";
            const today = new Date(); today.setHours(0,0,0,0);
            bikes.forEach((bike, index) => {
                const conf = bike.liquid === 'natural' ? appConfig.freq.natural : appConfig.freq.sintetico;
                const nextRell = new Date(bike.lastRefill); nextRell.setMonth(nextRell.getMonth() + conf.rell);
                const nextFull = new Date(bike.lastChange); nextFull.setMonth(nextFull.getMonth() + conf.full);
                const dRell = Math.ceil((nextRell - today) / 8.64e7);
                const dFull = Math.ceil((nextFull - today) / 8.64e7);
                const mlFull = calculateML(bike.category, bike.size, bike.width);
                container.innerHTML += `<div class="rounded-[2.5rem] shadow-xl p-6 bg-white ${dRell <= 0 || dFull <= 0 ? 'status-red' : 'status-green'}">
                    <div class="flex justify-between items-start mb-4 border-b pb-2 text-slate-900">
                        <div class="w-full">
                            <h3 class="text-3xl font-black uppercase italic leading-tight">${bike.name}</h3>
                            <p class="text-[10px] font-black text-blue-700 uppercase">${bike.category} | ${bike.size} x ${bike.width}</p>
                        </div>
                        <div class="flex gap-4"><button onclick="openBikeModal(${index})" class="text-3xl text-slate-300 hover:text-slate-900"><i class="fas fa-edit"></i></button><button onclick="if(confirm('¿Borrar?')){bikes.splice(${index},1);saveAppData();}" class="text-3xl text-red-100"><i class="fas fa-trash"></i></button></div>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-blue-50 p-4 rounded-3xl border flex justify-between items-center leading-none text-slate-900">
                            <div><p class="text-[9px] font-black uppercase text-blue-800 mb-1">Relleno</p><p class="text-ml-gigante">${Math.round(mlFull/2/10)*10}<span class="text-lg">ml</span></p></div>
                            <div class="text-right"><p class="text-[9px] font-black text-slate-400 uppercase">Faltan</p><p class="text-dias-gigante ${dRell <= 0 ? 'text-red-600 animate-pulse' : ''}">${dRell}d</p><button onclick="quickUpdate(${index}, 'relleno')" class="mt-2 bg-blue-600 text-white px-6 py-2 rounded-xl font-black uppercase text-[10px]">Hecho</button></div>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-3xl border flex justify-between items-center leading-none text-slate-900">
                            <div><p class="text-[9px] font-black uppercase text-emerald-800 mb-1">Cambio</p><p class="text-ml-gigante">${mlFull}<span class="text-lg">ml</span></p></div>
                            <div class="text-right"><p class="text-[9px] font-black text-slate-400 uppercase">Faltan</p><p class="text-dias-gigante ${dFull <= 0 ? 'text-red-600 animate-pulse' : ''}">${dFull}d</p><button onclick="quickUpdate(${index}, 'cambio')" class="mt-2 bg-emerald-600 text-white px-6 py-2 rounded-xl font-black uppercase text-[10px]">Hecho</button></div>
                        </div>
                    </div></div>`;
            });
        }
        renderBikes();
    </script>
</body>
</html>
